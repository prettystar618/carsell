<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabbage Car Sale</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }
        body{
            background:#fff;
            color:#333;
        }
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#f5f5f5;
            padding:18px 40px;
            border-bottom:1px solid #eee;
            position: relative;
            width: 100%;
        }
        .logo{
            display:flex;
            align-items:center;
            gap:10px;
            font-size:24px;
            font-weight:bold;
            color:#1a73e8;
            text-decoration:none;
            position: relative;
        }
        .nav-links{
            display:flex;
            gap:30px;
            position: relative;
        }
        .nav-links a{
            text-decoration:none;
            color:#555;
            font-size:16px;
        }
        .nav-links a:hover{
            color:#1a73e8;
        }

        .container{
            position: relative;
            left: 50%;
            top: 80px;
            transform: translateX(-50%);
            width: 600px;
            margin-bottom: 120px;
        }
        .page-title{
            text-align:center;
            font-size:28px;
            margin-bottom:35px;
            color:#333;
        }
        .form-group{
            margin-bottom: 25px;
        }
        label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color:#333;
            font-size: 16px;
        }
        input{
            width: 100%;
            padding:12px;
            border:1px solid #eee;
            border-radius:5px;
            font-size:16px;
            outline:none;
        }
        input:focus {
            border-color:#1a73e8;
        }

        .submit-btn {
            display:inline-flex;
            align-items:center;
            gap:8px;
            width:100%;
            background:#1a73e8;
            color:#fff;
            padding:12px 25px;
            border-radius:5px;
            border:none;
            font-size:16px;
            cursor:pointer;
            justify-content:center;
        }
        .submit-btn:hover {
            background:#0d5bbc;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .footer{
            background:#f5f5f5;
            text-align:center;
            padding:25px;
            border-top:1px solid #eee;
            margin-top:40px;
            color:#666;
            position: relative;
            top: 120px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="home.html" class="logo">
            <i class="fa-solid fa-car"></i> Cabbage
        </a>
        <div class="nav-links">
            <a href="search.html">Search</a>
            <a href="home.html">Home</a>
            <a href="seller.html">Seller</a>
            <a href="login.html">Login</a>
        </div>
    </div>

    <div class="container">
        <h2 class="page-title">Add New Car</h2>
        <form id="addCarForm">
            <div class="form-group">
                <label>Car Color</label>
                <input type="text" id="color">
                <div class="error" id="colorError">Please enter car color</div>
            </div>

            <div class="form-group">
                <label>Car Model</label>
                <input type="text" id="model">
                <div class="error" id="modelError">Please enter car model</div>
            </div>

            <div class="form-group">
                <label>Manufacture Year</label>
                <input type="number" id="year">
                <div class="error" id="yearError">Please enter valid year (1900-2025)</div>
            </div>

            <div class="form-group">
                <label>Car Location</label>
                <input type="text" id="location">
                <div class="error" id="locationError">Please enter car location</div>
            </div>

            <div class="form-group">
                <label>Price (¥)</label>
                <input type="number" id="price">
                <div class="error" id="priceError">Please enter valid price (>0)</div>
            </div>

            <div class="form-group">
                <label>Car Image</label>
                <input type="file" id="carImage" accept="image/*">
                <div class="error" id="imageError">Please upload car image</div>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fa-solid fa-plus"></i> Submit Car Information
            </button>
        </form>
    </div>

    <div class="footer">
        © 2026 Cabbage Car Sale. All rights reserved.
    </div>

<script>
    var f = document.getElementById("carForm");
    f.onsubmit = function(e){
        e.preventDefault();

        var c = document.getElementById("c").value.trim();
        var m = document.getElementById("m").value.trim();
        var y = document.getElementById("y").value.trim();
        var l = document.getElementById("l").value.trim();
        var p = document.getElementById("p").value.trim();
        var img = document.getElementById("img").files[0];

        document.getElementById("cTip").style.display="none";
        document.getElementById("mTip").style.display="none";
        document.getElementById("yTip").style.display="none";
        document.getElementById("lTip").style.display="none";
        document.getElementById("pTip").style.display="none";
        document.getElementById("imgTip").style.display="none";

        var ok = true;

        if(c==""){document.getElementById("cTip").style.display="block"; ok=false;}
        if(m==""){document.getElementById("mTip").style.display="block"; ok=false;}
        if(isNaN(y)||y<1900||y>2025){document.getElementById("yTip").style.display="block"; ok=false;}
        if(l==""){document.getElementById("lTip").style.display="block"; ok=false;}
        if(isNaN(p)||p<=0){document.getElementById("pTip").style.display="block"; ok=false;}
        if(!img){document.getElementById("imgTip").style.display="block"; ok=false;}

        if(ok){
            alert("Car added success!");
            window.location.href="home.html";
        }
    }
</script>
</body>
</html>
