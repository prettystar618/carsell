<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabbage Car Sale - Register</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }
    body{
        background:#fff;
        color:#333;
    }
    .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:#f5f5f5;
        padding:18px 40px;
        border-bottom:1px solid #eee;
    }
    /* 完全复用home2中的logo样式 */
    .logo{
        display:flex;
        align-items:center;
        gap:10px;
        font-size:24px;
        font-weight:bold;
        color:#1a73e8;
        text-decoration:none;
    }
    .logo::before{
        content:"";
        width:28px;
        height:20px;
        border:3px solid #1a73e8;
        border-radius:4px;
        position:relative;
    }
    .logo::after{
        content:"";
        position:absolute;
        width:8px;
        height:8px;
        background:#1a73e8;
        border-radius:50%;
        margin-left:4px;
        margin-top:12px;
        box-shadow:12px 0 0 #1a73e8;
    }
    .nav-links{
        display:flex;
        gap:30px;
    }
    .nav-links a{
        text-decoration:none;
        color:#555;
        font-size:16px;
    }
    .nav-links a:hover{
        color:#1a73e8;
    }

    .register-container{
        max-width:500px;
        margin:50px auto;
        padding:0 20px;
    }
    .title{
        text-align:center;
        font-size:28px;
        margin-bottom:35px;
    }
    .register-form{
        background:#f9f9f9;
        padding:30px;
        border-radius:8px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }
    .form-group{
        margin-bottom:20px;
    }
    .form-group label{
        display:block;
        margin-bottom:8px;
        font-size:16px;
        color:#555;
    }
    .form-group input{
        width:100%;
        padding:12px 15px;
        border:1px solid #ddd;
        border-radius:5px;
        font-size:16px;
        outline:none;
    }
    .form-group input:focus{
        border-color:#1a73e8;
    }
    .form-group .icon-input{
        position:relative;
    }
    .form-group .icon-input i{
        position:absolute;
        right:15px;
        top:50%;
        transform:translateY(-50%);
        color:#999;
    }
    .form-group .icon-input input{
        padding-right:40px;
    }
    .register-btn{
        width:100%;
        background:#1a73e8;
        color:#fff;
        padding:12px;
        border:none;
        border-radius:5px;
        font-size:17px;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        text-decoration:none;
    }
    .register-btn:hover{
        background:#0d5bbc;
    }
    .login-link{
        text-align:center;
        margin-top:20px;
        font-size:16px;
        color:#666;
    }
    .login-link a{
        color:#1a73e8;
        text-decoration:none;
    }
    .login-link a:hover{
        text-decoration:underline;
    }
    .footer{
        background:#f5f5f5;
        text-align:center;
        padding:25px;
        border-top:1px solid #eee;
        margin-top:40px;
        color:#666;
    }
</style>
</head>
<body>

<div class="navbar">
    <a href="home.html" class="logo">
        Cabbage
    </a>
    <div class="nav-links">
        <a href="search.html">Search</a>
        <a href="home.html">Home</a>
        <a href="seller.html">Seller</a>
        <a href="login.html">Login</a>
    </div>
</div>

<div class="register-container">
    <h2 class="title">Create Your Account</h2>
    <div class="register-form">
        <div class="form-group">
            <label for="username">Username</label>
            <div class="icon-input">
                <input type="text" id="username" placeholder="Enter your username" required>
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="icon-input">
                <input type="email" id="email" placeholder="Enter your email" required>
                <i class="fa-solid fa-envelope"></i>
            </div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="icon-input">
                <input type="password" id="password" placeholder="Create a password" required>
                <i class="fa-solid fa-lock"></i>
            </div>
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="icon-input">
                <input type="password" id="confirm-password" placeholder="Confirm your password" required>
                <i class="fa-solid fa-lock"></i>
            </div>
        </div>
        <a href="home.html" class="register-btn">
            <i class="fa-solid fa-user-plus"></i> Register Now
        </a>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
</div>

<div class="footer">
    © 2026 Cabbage Car Sale. All rights reserved.
</div>

</body>
</html>
