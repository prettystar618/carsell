<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabbage Car Sale</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }
    body{
        background:#fff;
        color:#333;
    }
    .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:#f5f5f5;
        padding:18px 40px;
        border-bottom:1px solid #eee;
    }
    .logo{
        display:flex;
        align-items:center;
        gap:10px;
        font-size:24px;
        font-weight:bold;
        color:#1a73e8;
        text-decoration:none;
    }
    .logo::before{
        content:"";
        width:28px;
        height:20px;
        border:3px solid #1a73e8;
        border-radius:4px;
        position:relative;
    }
    .logo::after{
        content:"";
        position:absolute;
        width:8px;
        height:8px;
        background:#1a73e8;
        border-radius:50%;
        margin-left:4px;
        margin-top:12px;
        box-shadow:12px 0 0 #1a73e8;
    }
    .nav-links{
        display:flex;
        gap:30px;
    }
    .nav-links a{
        text-decoration:none;
        color:#555;
        font-size:16px;
    }
    .nav-links a:hover{
        color:#1a73e8;
    }

    .login-container {
        max-width:500px;
        margin:50px auto;
        padding:0 20px;
        height: auto;
        background-color: #fff;
    }
    /* 外部标题样式 */
    .page-title {
        text-align:center;
        font-size:28px;
        margin-bottom:25px;
        color: #333;
        font-weight:bold;
    }
    .login-card {
        background:#f9f9f9;
        padding:30px;
        border-radius:8px;
        box-shadow:0 2px 5px rgba(0,0,0,0.1);
        width: 100%;
    }
    .form-group {
        margin-bottom:20px;
    }
    .form-group label {
        display: block;
        margin-bottom:8px;
        font-size:16px;
        color:#555;
    }
    .form-group input {
        width:100%;
        padding:12px 15px;
        border:1px solid #ddd;
        border-radius:5px;
        font-size:16px;
        outline:none;
    }
    .form-group input:focus{
        border-color:#1a73e8;
    }
    .form-group .icon-input{
        position:relative;
    }
    .form-group .icon-input i{
        position:absolute;
        right:15px;
        top:50%;
        transform:translateY(-50%);
        color:#999;
    }
    .form-group .icon-input input{
        padding-right:40px;
    }
    .login-btn {
        width:100%;
        background:#1a73e8;
        color:#fff;
        padding:12px;
        border:none;
        border-radius:5px;
        font-size:17px;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        margin-top: 0;
    }
    .login-btn:hover {
        background:#0d5bbc;
    }
    .redirect-text {
        text-align:center;
        margin-top:20px;
        font-size:16px;
        color:#666;
    }
    .redirect-text a {
        color:#1a73e8;
        text-decoration:none;
    }
    .redirect-text a:hover{
        text-decoration:underline;
    }
    .footer{
        background:#f5f5f5;
        text-align:center;
        padding:25px;
        border-top:1px solid #eee;
        margin-top:40px;
        color:#666;
    }
</style>
</head>
<body>
<div class="navbar">
    <a href="home.html" class="logo">
        Cabbage
    </a>
    <div class="nav-links">
        <a href="search.html">Search</a>
        <a href="home.html">Home</a>
        <a href="seller.html">Seller</a>
        <a href="login.html">Login</a>
    </div>
</div>

<div class="login-container">
    <!-- 标题放在表单框外部 -->
    <h2 class="page-title">Seller Login</h2>
    <div class="login-card">
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <div class="icon-input">
                    <input type="email" placeholder="Enter your email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="icon-input">
                    <input type="password" placeholder="Enter your password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="login-btn">
                <i class="fa-solid fa-right-to-bracket"></i> Login Now
            </button>
        </form>
        <p class="redirect-text">New seller? <a href="register.html">Register here</a></p>
        <p class="redirect-text"><a href="search.html">Browse cars without login</a></p>
    </div>
</div>

<div class="footer">
    © 2026 Cabbage Car Sale. All rights reserved.
</div>

</body>
</html>
